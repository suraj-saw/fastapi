# docker-compose.yml

services:

  postgres:
    image: postgis/postgis:16-3.5
    container_name: dashboard-auth-postgres
    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: dashboard_db

    ports:
      - "127.0.0.1:5432:5432"

    volumes:
      - postgres_postgis_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dashboard_db"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - dashboard-auth-net


  redis:
    image: redis:7-alpine
    container_name: dashboard-auth-redis
    restart: always

    ports:
      - "127.0.0.1:6379:6379"

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

    networks:
      - dashboard-auth-net


  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: dashboard-auth-backend
    restart: always

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    expose:
      - "8000"

    networks:
      - dashboard-auth-net


  nginx:
    image: nginx:alpine
    container_name: dashboard-auth-nginx
    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      # - ./frontend/dist:/usr/share/nginx/html:ro

    depends_on:
      - backend

    networks:
      - dashboard-auth-net


networks:
  dashboard-auth-net:
    driver: bridge


volumes:
  postgres_postgis_data: